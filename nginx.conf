# Speekeasy Nginx Load Balancer Config
# Place at: /etc/nginx/sites-available/speekeasy
# Enable with: ln -s /etc/nginx/sites-available/speekeasy /etc/nginx/sites-enabled/

# Upstream pool -- add more servers here as you scale
upstream speekeasy_backend {
    # Least connections algorithm -- sends new requests to the least busy server
    least_conn;

    # Your backend instances (same server, different ports when using cluster.js)
    server 127.0.0.1:3001 weight=1 max_fails=3 fail_timeout=30s;

    # Add more instances as needed:
    # server 127.0.0.1:3002 weight=1 max_fails=3 fail_timeout=30s;
    # server 10.0.0.2:3001  weight=1 max_fails=3 fail_timeout=30s;  # separate server

    # Keep connections warm (reduces latency)
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name speekeasy.io www.speekeasy.io;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name speekeasy.io www.speekeasy.io;

    # SSL (use certbot to generate: certbot --nginx -d speekeasy.io)
    ssl_certificate     /etc/letsencrypt/live/speekeasy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/speekeasy.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (in addition to helmet.js on the server)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression at Nginx level
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Rate limiting at Nginx level (first line of defense before Express)
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req zone=api burst=50 nodelay;

    # Serve the built React frontend directly from Nginx (faster than Express)
    root /home/deploy/speekeasy/dist;
    index index.html;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check endpoint -- no rate limiting, no logging
    location /health {
        access_log off;
        proxy_pass http://speekeasy_backend;
        proxy_http_version 1.1;
    }

    # WebSocket connections -- require sticky routing
    location /ws {
        proxy_pass http://speekeasy_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API routes -- proxy to backend cluster
    location /api {
        proxy_pass http://speekeasy_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffer settings for API responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Webhook routes -- proxy to backend
    location /webhooks {
        proxy_pass http://speekeasy_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other routes -- serve React SPA
    location / {
        try_files $uri $uri/ /index.html;

        # Cache HTML briefly (allows fast deploys)
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
}
